---
title: Password Reset
---

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
</head>

<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,Helvetica,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:10px;padding:40px;">
                    <tr>
                        <td align="center">
                            <h1 style="color:#fd7e14;margin:0;">🔒 Password Reset</h1>

                            <p style="font-size:16px;color:#555;">
                                We received a request to reset your password.
                            </p>

                            <p style="font-size:16px;color:#555;">
                                Enter the following verification code:
                            </p>

                            <div style="margin:30px 0;">
                                <span
                                    style="display:inline-block;background:#fd7e14;color:#fff;font-size:34px;font-weight:bold;padding:18px 40px;border-radius:8px;letter-spacing:8px;">
                                    {{code}}
                                </span>
                            </div>

                            <p style="font-size:14px;color:#777;">
                                If you didn't request a password reset, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
